apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: support-chat-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: support-chat-api
  minReplicas: 3
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
